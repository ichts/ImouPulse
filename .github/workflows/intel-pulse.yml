name: ImouPulse

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/main.py

      - name: Commit and push
        run: |
          git config user.name "imoupulse-bot"
          git config user.email "bot@imoupulse"
          git add docs/ reports/
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%d)"
          git push
